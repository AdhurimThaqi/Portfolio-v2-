[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Pretty API paths -> serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Admin panel lives on its own bundle (Vite multi-page build)
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin.html"
  status = 200
